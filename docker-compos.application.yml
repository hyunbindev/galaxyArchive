services:
  galaxy-archive-api:
    image: ghcr.io/${REPO_LOWER}/galaxy-archive-be:latest
    container-name: galaxy-archive-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      # Database
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}

      # OAuth2
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}

      # MinIO
      - MINIO_USER=${MINIO_USER}
      - MINIO_PASSWORD=${MINIO_PASSWORD}

    networks:
      - galaxy-network

networks:
  galaxy-network:
    external: true